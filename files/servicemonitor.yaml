apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: prometheus-kube-state-metrics
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: prometheus-kube-state-metrics
  namespaceSelector:
    matchNames:
      - monitoring
  endpoints:
    - port: "8080"
      interval: 30s
