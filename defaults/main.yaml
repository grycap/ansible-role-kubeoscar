# OSCAR version to install (can be a release tag or "latest")
oscar_version: "4.0.0"
# Namespace to deploy OSCAR services
oscar_services_namespace: "oscar-svc"
# OSCAR username for basic auth
oscar_user: "oscar"
# OSCAR password for basic auth
oscar_pass: "oscar123"
# Service type for OSCAR
oscar_service_type: "ClusterIP"
# NodePort used if the service type is NodePort
oscar_nodeport: 30301
# Expose by a Kubernetes Ingress
create_ingress: false
# DNS hostname for the ingress
dns_host: "''"
# Cert-manager issuer to automatically assign TLS certificates
cert_manager_issuer: "''"
# Serverless Backend (can be "openfaas" or "''")
serverless_backend: "''"
# Namespace where the OpenFaaS gateway is deployed
openfaas_namespace: "openfaas"
# Service port where the OpenFaaS gateway is exposed (ClusterIP)
openfaas_port: 8080
# Enable OF Scaler
openfaas_scaler_enable: false
# Time interval to check if there are idle OpenFaaS functions
openfaas_scaler_interval: "2m"
# Duration with no requests to consider that an OpenFaaS function is idle
openfaas_scaler_inactivity_duration: "10m"
# MinIO endpoint
minio_endpoint: "https://minio-service.minio:9000"
# Verify MinIO's TLS certificates for HTTPS connections
minio_tls_verify: false
# Region of the MinIO server
minio_region: "us-east-1"
# Access key of the MinIO server
minio_access_key: "minio"
# Secret key of the MinIO server
minio_secret_key: "minio123"
# Enable MinIO quota
minio_quota_enabled: false
# Number of buckets to create if MinIO quota is enabled
minio_quota_buckets: 5
# Storage quota per bucket if MinIO quota is enabled (e.g., "10Gi")
minio_quota_storage: "5Gi"
# FaaS Supervisor version to use in the OSCAR's services
supervisor_version: "1.6.2"
# Deploy in Kubernetes Master node
master_deploy: false
# Default kubeconfig path
kubeconfig_path: '/etc/kubernetes/admin.conf'
# Version of oscar-cli to be installed and configured
oscar_cli_version: "v1.4.0"
# Enable Resource Manager
resource_manager_enable: true
# Time interval (in seconds) to update the available resources in the cluster
resource_manager_interval: 15
# Enable ReScheduler
rescheduler_enable: true
# Time interval (in seconds) to check if pending jobs
rescheduler_interval: 15
# Time (in seconds) that a job (with replicas) can be queued before delegating it
rescheduler_threshold: 30
# Parameter to enable the integration with Apache YuniKorn
yunikorn_enable: false
# Parameter to enable OpenID Connect support
oidc_enable: false
# OpenID Connect issuer as returned in the "iss" field of the JWT payload
oidc_issuer: "https://aai.egi.eu/auth/realms/egi"
# OpenID Connect Subject (user identifier)
oidc_subject: ""
# OpenID group list to grant access in the cluster. Groups defined in the "eduperson_entitlement" OIDC scope, as described in https://docs.egi.eu/providers/check-in/sp/#10-groups
oidc_groups: []
# Additional OSCAR configuration
additional_config:
  allowedImagePrefix: []

# Configure kueue resource
kueue_enable: false
kueue_default_cpu: "2"
kueue_default_memory: "2Gi"
kueue_default_flavor: "oscar-default-flavor"

# Configure Prometheus
prometheus_url: ""
prometheus_cpu_query: '{% raw %}sum(increase(container_cpu_usage_seconds_total{namespace=~\"{{services_namespace}}.*\",service=~\"{{service}}\"}[{{range}}])) / 3600){% endraw %}'
prometheus_gpu_query: '{% raw %}sum(increase(container_gpu_usage_seconds_total{namespace=~\"{{services_namespace}}.*\",service=~\"{{service}}\"}[{{range}}])) / 3600){% endraw %}'

# Configure Loki
loki_url: ""
loki_query: '{% raw %}{namespace=\"{{namespace}}\", app=\"{{app}}\"} |~ \"/(job|run)/\"{% endraw %}'
loki_exposed_query: '{% raw %}{namespace=\"{{namespace}}\", app=\"{{app}}\"} |~ \"/system/services/.+/exposed\"{% endraw %}'
loki_exposed_namespace: "ingress-nginx"
loki_exposed_app_label: "ingress-nginx"

# Configure Exposed Services
exposed_services_route_kind: "ingress"

# Configure HTTPRoute
httproute_gateway_name: "traefik-gateway"
httproute_gateway_namespace: "traefik"

# Configure Ingress Services CORS
ingress_services_cors_allowed_origins: "https://dashboard.oscar.grycap.net,https://dashboard-devel.oscar.grycap.net,https://dashboard-demo.oscar.grycap.net,http://oscar.oscar.svc.cluster.local,http://host.docker.internal,http://localhost,http://localhost:5173"
ingress_services_cors_allowed_methods: "GET, PUT, POST, DELETE, PATCH, HEAD"
ingress_services_cors_allowed_headers: "Authorization, Content-Type"

# Enable monitoring (Prometheus, Grafana, Loki)
metrics: false

# Additional config file path
additional_config_path: "config.yaml"

# Configure Volume
volume_storage_class_name: "managed-nfs-storage"
volume_watchdog_version: "0.2.1"
volume_supervisor_kit: "docker://ghcr.io/grycap/faas-supervisor-kit"
volume_enable: false
volume_default_available: "7Gi"
volume_default_max: "5"
volume_default_max_disk: "5Gi"
volume_default_min_disk: "200Mi"